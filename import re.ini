import re
from typing import Dict, List, Optional

# ------------------ 1. 解析粘贴的文字 ------------------
def parse_tutor_text(text: str) -> Dict:
    """从一段乱七八糟的文字里提取家教信息"""
    text = text.lower().replace('元/小时', '元').replace('块', '').replace('元/时', '元')
    tutor = {}

    # 性别
    if any(word in text for word in ['女生', '女老师', '小姐姐', '女']):
        tutor['gender'] = '女'
    elif any(word in text for word in ['男生', '男老师', '小哥哥', '男']):
        tutor['gender'] = '男'

    # 科目（可扩展更多关键词）
    subjects = []
    subject_keywords = {
        '数学': ['数学', '数', '奥数'],
        '物理': ['物理', '物'],
        '化学': ['化学', '化'],
        '英语': ['英语', '英'],
        '语文': ['语文', '语']
    }
    for sub, kws in subject_keywords.items():
        if any(kw in text for kw in kws):
            subjects.append(sub)
    if subjects:
        tutor['subjects'] = subjects

    # 年级/阶段
    grades = []
    if any(k in text for k in ['小学', '小学生']):
        grades.append('小学')
    if any(k in text for k in ['初中', '初一', '初二', '初三']):
        grades.append('初中')
    if any(k in text for k in ['高中', '高一', '高二', '高三']):
        grades.append('高中')
    if '竞赛' in text or '奥赛' in text:
        tutor['is_competition'] = True
    if grades:
        tutor['teach_grades'] = grades

    # 价格
    price_match = re.search(r'(\d{2,4})[元]?[/]?[小]?[时]?', text)
    if price_match:
        tutor['price'] = int(price_match.group(1))

    # 时间（非常粗糙版，可后面细化）
    days = []
    if any(k in text for k in ['周末', '周六', '周日']):
        days.append('周末')
    if '周一' in text or '周2' in text: days.append('周一到周五')
    tutor['available_days'] = days if days else ['灵活']

    # 线上/线下
    if '线上' in text or '网课' in text or '网络' in text:
        tutor['mode'] = '线上'
    elif '线下' in text or '上门' in text or '家教' in text:
        tutor['mode'] = '线下'
    else:
        tutor['mode'] = '线上/线下均可'

    return tutor


# ------------------ 2. 计算匹配度 + 正负点 ------------------
def match_tutor(student: Dict, tutor: Dict) -> tuple[float, List[str], List[str]]:
    score = 0.0
    positive = []
    negative = []

    # 科目匹配（权重最高）
    s_subs = set(student.get('subjects', []))
    t_subs = set(tutor.get('subjects', []))
    common = s_subs & t_subs
    if common:
        sub_score = 90 + 10 * (len(common) / max(len(s_subs), 1))
        score += sub_score * 0.40
        positive.append(f"科目匹配：{', '.join(common)}")
    else:
        negative.append("科目几乎不匹配")
        score += 10 * 0.40

    # 价格
    s_budget = student.get('budget', 120)
    t_price = tutor.get('price', 999)
    if t_price <= s_budget:
        score += 100 * 0.20
        positive.append(f"价格合适：{t_price}元 ≤ 预算{s_budget}元")
    elif t_price <= s_budget * 1.2:
        score += 70 * 0.20
        positive.append(f"价格稍高但可接受：{t_price}元")
    else:
        score += max(0, 100 - (t_price - s_budget) * 3) * 0.20
        negative.append(f"价格偏高：{t_price}元 > 预算{s_budget}元")

    # 年级匹配
    s_grade = student.get('grade', '高中')
    t_grades = tutor.get('teach_grades', [])
    if s_grade in t_grades or any('高' in g for g in t_grades if '高' in s_grade):
        score += 95 * 0.15
        positive.append("年级匹配良好")
    else:
        score += 50 * 0.15
        negative.append("年级有差距")

    # 性别偏好
    if student.get('gender_pref') and tutor.get('gender') == student['gender_pref']:
        score += 100 * 0.10
        positive.append("性别符合偏好")
    elif student.get('gender_pref'):
        negative.append("性别不符合偏好")

    # 教学模式
    if student.get('prefer_online', True) and tutor.get('mode', '').startswith('线上'):
        score += 100 * 0.10
        positive.append("支持线上教学")
    elif tutor.get('mode') == '线下':
        score += 80 * 0.10
        positive.append("可线下")

    # 最终分数限制在 0~100
    final_score = min(100.0, max(0.0, score))
    return round(final_score, 1), positive, negative


# ------------------ 主程序 ------------------
def main():
    print("=== 家教信息快速匹配工具 ===\n")
    print("先输入【学生】的基本要求（可直接回车用默认值）：")

    student = {
        'subjects': ['数学', '物理'],
        'grade': '高中',
        'budget': 130,
        'gender_pref': '女',
        'prefer_online': True
    }

    # 你可以在这里让用户输入，暂时用默认
    print("(目前使用默认学生信息：高中数学物理，预算130，偏好女老师，接受线上)\n")

    print("请粘贴家教的自我介绍或微信聊天记录（输入 END 结束）：")
    lines = []
    while True:
        line = input()
        if line.strip().upper() == 'END':
            break
        lines.append(line)
    text = '\n'.join(lines)

    if not text.strip():
        print("没有输入内容，程序退出。")
        return

    tutor = parse_tutor_text(text)
    print("\n解析出的家教信息：")
    for k, v in tutor.items():
        print(f"  {k:12}: {v}")

    score, positives, negatives = match_tutor(student, tutor)

    print("\n" + "="*40)
    print(f"匹配度：{score}%")
    print("\n👍 匹配亮点：")
    for p in positives or ["暂无明显亮点"]:
        print(f"  • {p}")

    print("\n⚠️ 需要注意：")
    for n in negatives or ["基本都符合预期"]:
        print(f"  • {n}")
    print("="*40)


if __name__ == '__main__':
    main()